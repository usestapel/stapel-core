name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install
        run: pip install -e ".[all]" || pip install -e .

      - name: Lint
        run: |
          pip install ruff --quiet
          ruff check . --select E,F,W --ignore E501

      - name: emit-check (outbox atomicity gate)
        run: python lint/emit_check.py .

      # - name: migration-lint (expand/contract gate, release-management.md §3)
      #   run: |
      #     pip install stapel-tools --quiet
      #     stapel-migration-lint . --strict
      # TODO(migration-lint): no module repo's CI can install stapel-tools yet
      # (not on PyPI under the new org; no git-install step wired in any
      # module repo's CI as of this pass). Enable this step once that lands;
      # until then run `make migration-lint` locally / at release-cut time.

      - name: Import check
        run: python -c "import stapel_core; print('import OK')"

      - name: Install test dependencies
        # .[dev] brings pytest/pytest-cov + celery (the optional executor the
        # tests exercise); phonenumbers is a declared runtime dependency now.
        run: pip install ".[dev]" pytest-django

      - name: Tests with coverage
        run: |
          pytest tests/ \
            --cov=stapel_core \
            --cov-report=term-missing \
            --cov-report=xml \
            --junitxml=junit.xml \
            -o junit_family=legacy \
            -v

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        if: ${{ !cancelled() }}
        continue-on-error: true
        with:
          files: coverage.xml
          flags: stapel-core
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload test results to Codecov
        uses: codecov/test-results-action@v1
        if: ${{ !cancelled() }}
        continue-on-error: true
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
