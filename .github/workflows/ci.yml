name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install
        run: pip install ".[all]" || pip install .

      - name: Lint
        run: |
          pip install ruff --quiet
          ruff check . --select E,F,W --ignore E501

      - name: Import check
        run: python -c "import stapel_core; print('import OK')"

      - name: Install test dependencies
        run: pip install pytest pytest-django pytest-cov

      - name: Hide local package source from pytest
        # The flat layout (package-dir={"stapel_core":"."}) makes __init__.py live at
        # the repo root. pytest tries to import it as a package initializer during
        # test setup (importtestmodule(self.path / "__init__.py")), which fails because
        # the file is imported without a package context. Renaming it after pip install
        # (package is now in site-packages) prevents pytest from finding it.
        run: mv __init__.py __init__.py.bak

      - name: Tests with coverage
        run: |
          pytest tests/ \
            --cov=stapel_core \
            --cov-report=term-missing \
            --cov-report=xml \
            --junitxml=junit.xml \
            -o junit_family=legacy \
            -v

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        if: ${{ !cancelled() }}
        continue-on-error: true
        with:
          files: coverage.xml
          flags: stapel-core
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload test results to Codecov
        uses: codecov/test-results-action@v1
        if: ${{ !cancelled() }}
        continue-on-error: true
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
