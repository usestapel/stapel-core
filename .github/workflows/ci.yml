name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install
        run: pip install ".[all]" || pip install .

      - name: Lint
        run: |
          pip install ruff --quiet
          ruff check . --select E,F,W --ignore E501

      - name: Import check
        run: python -c "import stapel_core; print('import OK')"

      - name: Install test dependencies
        run: pip install pytest pytest-cov

      - name: Tests with coverage
        # Run from /tmp so CWD's django/ dir doesn't shadow the installed Django package.
        # The flat package layout (package-dir={"stapel_core":"."}) puts django/ at repo
        # root, which Python's '' sys.path entry would pick up before site-packages.
        run: |
          cd /tmp && python -m pytest $GITHUB_WORKSPACE/tests/ \
            --rootdir=$GITHUB_WORKSPACE \
            --cov=stapel_core \
            --cov-report=term-missing \
            --cov-report=xml:$GITHUB_WORKSPACE/coverage.xml \
            --junitxml=$GITHUB_WORKSPACE/junit.xml \
            -o junit_family=legacy \
            -v

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        if: ${{ !cancelled() }}
        continue-on-error: true
        with:
          files: coverage.xml
          flags: stapel-core
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload test results to Codecov
        uses: codecov/test-results-action@v1
        if: ${{ !cancelled() }}
        continue-on-error: true
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
