[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "stapel-core"
version = "0.1.0"
description = "Core Django utilities for the Stapel framework"
readme = "README.md"
license = { text = "MIT" }
requires-python = ">=3.11"
keywords = ["django", "stapel", "auth", "jwt"]
classifiers = [
    "Framework :: Django",
    "Framework :: Django :: 4.2",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
]

dependencies = [
    "Django>=4.2",
    "djangorestframework>=3.14",
    "drf-spectacular>=0.27",
    "django-redis>=5.4",
    "PyJWT>=2.8",
    "cryptography>=41.0",
]

[project.optional-dependencies]
kafka = [
    "confluent-kafka>=2.3",
]
sentry = [
    "sentry-sdk>=1.40",
]
all = [
    "stapel-core[kafka,sentry]",
]

[tool.setuptools]
package-dir = {"stapel_core" = "."}
packages = ["stapel_core", "stapel_core.bus", "stapel_core.bus.backends", "stapel_core.core", "stapel_core.django", "stapel_core.django.management", "stapel_core.django.management.commands", "stapel_core.django.users", "stapel_core.django.users.migrations", "stapel_core.kafka", "stapel_core.notifications"]
